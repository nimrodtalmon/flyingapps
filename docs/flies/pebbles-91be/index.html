<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="fly:tags" content="ambient,mindful,visual">
<title>Pebbles</title>
<style>
  html,body{margin:0;height:100%;background:radial-gradient(120% 80% at 50% 30%,#E0EEF2 0%,#CFE2EC 60%,#B8D2DF 100%);overflow:hidden;-webkit-tap-highlight-color:transparent;font-family:-apple-system,system-ui,sans-serif;user-select:none}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  .hint{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:.22em;text-transform:lowercase;color:rgba(26,35,48,.4);pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">tap the water</div>
<script>
(function(){if(window.Fly)return;function s(t,p){try{parent.postMessage({source:"fly",type:t,payload:p||null},"*")}catch(e){}}window.Fly={ready:()=>s("fly:ready"),interaction:k=>s("fly:interaction",{kind:k||null}),complete:()=>s("fly:complete"),catch:()=>s("fly:catch")};window.addEventListener("message",e=>{const d=e.data;if(!d||typeof d!=="object")return;if(d.type==="fly:active")window.dispatchEvent(new CustomEvent("fly:active"));if(d.type==="fly:pause")window.dispatchEvent(new CustomEvent("fly:pause"))});function r(){Fly.ready()}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",r,{once:true});else r();})();
</script>
<script>
  const c = document.getElementById("c");
  const ctx = c.getContext("2d");
  let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W = c.clientWidth; H = c.clientHeight;
    c.width = W*dpr; c.height = H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", resize); resize();

  const ripples = [];
  function drop(x,y){
    ripples.push({ x, y, r: 0, t: 0, life: 1, hue: 180 + Math.random()*40 });
    if (ripples.length > 24) ripples.shift();
  }

  let running = true, raf = 0;
  function frame(){
    if (!running) return;
    ctx.fillStyle = "rgba(184,210,223,0.18)";
    ctx.fillRect(0,0,W,H);
    for (let i = ripples.length-1; i >= 0; i--){
      const r = ripples[i];
      r.t += 1/60;
      r.r += 1.6;
      r.life = Math.max(0, 1 - r.t / 3.2);
      if (r.life <= 0) { ripples.splice(i,1); continue; }
      // outer ring
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
      ctx.strokeStyle = `hsla(${r.hue},45%,40%,${0.55*r.life})`;
      ctx.lineWidth = 1.4;
      ctx.stroke();
      // inner ring (delayed)
      if (r.r > 16){
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.r - 14, 0, Math.PI*2);
        ctx.strokeStyle = `hsla(${r.hue},60%,55%,${0.35*r.life})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      // small dot
      if (r.t < 0.4){
        ctx.beginPath();
        ctx.arc(r.x, r.y, 3*(1 - r.t/0.4), 0, Math.PI*2);
        ctx.fillStyle = `hsla(${r.hue},50%,40%,${0.7})`;
        ctx.fill();
      }
    }
    raf = requestAnimationFrame(frame);
  }
  frame();

  c.addEventListener("pointerdown", (e) => {
    const rect = c.getBoundingClientRect();
    drop(e.clientX - rect.left, e.clientY - rect.top);
    Fly.interaction("drop");
  });

  window.addEventListener("fly:pause", () => { running = false; cancelAnimationFrame(raf); });
  window.addEventListener("fly:active", () => { if (!running) { running = true; frame(); } });
</script>
</body>
</html>
