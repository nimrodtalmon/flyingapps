<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="fly:tags" content="tool,quick,game">
<title>Roll Die</title>
<style>
  html,body{margin:0;height:100%;background:linear-gradient(180deg,#EAF1F6 0%,#F7FAFC 100%);font-family:-apple-system,system-ui,sans-serif;color:#1A2330;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:24px}
  .die{position:relative;width:46vmin;height:46vmin;max-width:200px;max-height:200px;border-radius:24px;background:radial-gradient(circle at 30% 25%,#FFFFFF,#E5EEF3 70%,#D5E1EA 100%);box-shadow:inset 0 1px 1px #fff,0 14px 30px rgba(46,80,110,.16);display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;padding:14%;gap:6%;cursor:pointer;transition:transform 600ms cubic-bezier(.16,1,.3,1)}
  .die.rolling{animation:roll 600ms ease-in-out}
  @keyframes roll{
    0%{transform:rotate(0) scale(1)}
    25%{transform:rotate(-90deg) scale(.9)}
    50%{transform:rotate(180deg) scale(.85)}
    75%{transform:rotate(360deg) scale(.92)}
    100%{transform:rotate(720deg) scale(1)}
  }
  .pip{border-radius:50%;background:#1A2330;opacity:0;align-self:center;justify-self:center;width:62%;height:62%}
  .pip.on{opacity:1}
  .recent{display:flex;gap:10px;font-variant-numeric:tabular-nums}
  .recent .r{width:32px;height:32px;border-radius:8px;background:#fff;display:grid;place-items:center;font-size:14px;color:#1A2330;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid rgba(26,35,48,.06)}
  .label{font-size:12px;letter-spacing:.22em;text-transform:lowercase;color:#8B97A6}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">tap the die</div>
  <div id="die" class="die">
    <div class="pip" data-i="0"></div><div class="pip" data-i="1"></div><div class="pip" data-i="2"></div>
    <div class="pip" data-i="3"></div><div class="pip" data-i="4"></div><div class="pip" data-i="5"></div>
    <div class="pip" data-i="6"></div><div class="pip" data-i="7"></div><div class="pip" data-i="8"></div>
  </div>
  <div class="recent" id="recent"></div>
</div>
<script>
(function(){if(window.Fly)return;function s(t,p){try{parent.postMessage({source:"fly",type:t,payload:p||null},"*")}catch(e){}}window.Fly={ready:()=>s("fly:ready"),interaction:k=>s("fly:interaction",{kind:k||null}),complete:()=>s("fly:complete"),catch:()=>s("fly:catch")};window.addEventListener("message",e=>{const d=e.data;if(!d||typeof d!=="object")return;if(d.type==="fly:active")window.dispatchEvent(new CustomEvent("fly:active"));if(d.type==="fly:pause")window.dispatchEvent(new CustomEvent("fly:pause"))});function r(){Fly.ready()}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",r,{once:true});else r();})();
</script>
<script>
  const PIP_MAP = {
    1:[4],
    2:[0,8],
    3:[0,4,8],
    4:[0,2,6,8],
    5:[0,2,4,6,8],
    6:[0,2,3,5,6,8],
  };
  const pips = [...document.querySelectorAll(".pip")];
  const die = document.getElementById("die");
  const recent = document.getElementById("recent");
  const history = [];
  function show(n){
    pips.forEach(p => p.classList.remove("on"));
    PIP_MAP[n].forEach(i => pips[i].classList.add("on"));
  }
  function roll(){
    if (die.classList.contains("rolling")) return;
    die.classList.add("rolling");
    let ticks = 0;
    const interval = setInterval(() => {
      show(1 + Math.floor(Math.random()*6));
      ticks++; if (ticks >= 6) clearInterval(interval);
    }, 80);
    setTimeout(() => {
      die.classList.remove("rolling");
      const n = 1 + Math.floor(Math.random()*6);
      show(n);
      history.unshift(n); if (history.length > 5) history.pop();
      recent.innerHTML = history.slice(1).map(x => `<div class="r">${x}</div>`).join("");
      Fly.interaction("roll");
    }, 620);
  }
  show(1);
  die.addEventListener("click", roll);
</script>
</body>
</html>
