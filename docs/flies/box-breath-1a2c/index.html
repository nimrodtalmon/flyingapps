<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="fly:tags" content="mindful,ambient,time">
<title>Box Breath</title>
<style>
  html,body{margin:0;height:100%;background:radial-gradient(120% 80% at 50% 30%,#EAF6F4 0%,#F4F8FA 60%,#FFFFFF 100%);font-family:-apple-system,system-ui,sans-serif;color:#1A2330;overflow:hidden;-webkit-tap-highlight-color:transparent}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px}
  .square{position:relative;width:62vmin;height:62vmin;max-width:280px;max-height:280px}
  .frame{position:absolute;inset:0;border-radius:24px;border:1px solid rgba(43,182,163,.18);background:radial-gradient(circle at 40% 35%,rgba(43,182,163,.10),transparent 70%)}
  .trail{position:absolute;background:#2BB6A3;border-radius:2px;transition:width 0s,height 0s}
  .trail.t{top:0;left:0;height:2px}
  .trail.r{top:0;right:0;width:2px}
  .trail.b{bottom:0;right:0;height:2px}
  .trail.l{bottom:0;left:0;width:2px}
  .dot{position:absolute;width:14px;height:14px;border-radius:50%;background:#2BB6A3;box-shadow:0 0 0 6px rgba(43,182,163,.18);transition:left 0s linear,top 0s linear;transform:translate(-50%,-50%)}
  .core{position:absolute;inset:14%;border-radius:18px;background:radial-gradient(circle at 35% 30%,#fff,#EFF7F5 60%,#DBEDE9 100%);box-shadow:inset 0 1px 1px #fff,0 8px 22px rgba(46,80,110,.12);display:grid;place-items:center;text-align:center}
  .phase{font-size:18px;letter-spacing:.18em;text-transform:lowercase;color:#1A2330;opacity:.78}
  .secs{font-variant-numeric:tabular-nums;font-size:38px;font-weight:200;color:#2BB6A3;margin-top:2px;letter-spacing:.02em}
  .meta{font-size:12px;letter-spacing:.18em;text-transform:lowercase;color:#8B97A6;text-align:center}
  .btn{margin-top:6px;padding:10px 22px;font:inherit;font-size:13px;letter-spacing:.18em;text-transform:lowercase;border-radius:999px;border:1px solid rgba(43,182,163,.35);background:#fff;color:#2BB6A3;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="square">
    <div class="frame"></div>
    <div class="trail t" id="trail-t" style="width:0%"></div>
    <div class="trail r" id="trail-r" style="height:0%"></div>
    <div class="trail b" id="trail-b" style="width:0%"></div>
    <div class="trail l" id="trail-l" style="height:0%"></div>
    <div class="dot" id="dot" style="left:0;top:0"></div>
    <div class="core">
      <div>
        <div id="phase" class="phase">ready</div>
        <div id="secs" class="secs">0</div>
      </div>
    </div>
  </div>
  <div class="meta"><span id="cycle">cycle 0 of 4</span></div>
  <button id="btn" class="btn">begin</button>
</div>
<script>
(function(){if(window.Fly)return;function s(t,p){try{parent.postMessage({source:"fly",type:t,payload:p||null},"*")}catch(e){}}window.Fly={ready:()=>s("fly:ready"),interaction:k=>s("fly:interaction",{kind:k||null}),complete:()=>s("fly:complete"),catch:()=>s("fly:catch")};window.addEventListener("message",e=>{const d=e.data;if(!d||typeof d!=="object")return;if(d.type==="fly:active")window.dispatchEvent(new CustomEvent("fly:active"));if(d.type==="fly:pause")window.dispatchEvent(new CustomEvent("fly:pause"))});function r(){Fly.ready()}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",r,{once:true});else r();})();
</script>
<script>
  const PHASE = document.getElementById("phase");
  const SECS  = document.getElementById("secs");
  const CYCLE = document.getElementById("cycle");
  const BTN   = document.getElementById("btn");
  const DOT   = document.getElementById("dot");
  const TRAIL = {
    t: document.getElementById("trail-t"),
    r: document.getElementById("trail-r"),
    b: document.getElementById("trail-b"),
    l: document.getElementById("trail-l"),
  };
  const SEQ = [
    { name: "in",   side: "t" },
    { name: "hold", side: "r" },
    { name: "out",  side: "b" },
    { name: "hold", side: "l" },
  ];
  const SECS_PER_SIDE = 4;
  const CYCLES = 4;
  let running = false, cycle = 0, step = 0, phaseT = null, tickT = null;

  function resetTrails(){ TRAIL.t.style.width="0%"; TRAIL.r.style.height="0%"; TRAIL.b.style.width="0%"; TRAIL.l.style.height="0%"; DOT.style.left="0px"; DOT.style.top="0px"; }

  function runStep(){
    if (!running) return;
    const s = SEQ[step];
    PHASE.textContent = s.name;
    SECS.textContent = SECS_PER_SIDE;
    let remaining = SECS_PER_SIDE;
    clearInterval(tickT);
    tickT = setInterval(() => { remaining -= 1; if (remaining >= 0) SECS.textContent = remaining; }, 1000);
    // Animate trail+dot over SECS_PER_SIDE seconds, on the active side.
    const sq = document.querySelector(".square").getBoundingClientRect();
    const W = sq.width;
    const start = performance.now();
    function frame(t){
      if (!running) return;
      const f = Math.min(1, (t - start) / (SECS_PER_SIDE*1000));
      const trail = TRAIL[s.side];
      if (s.side === "t") { trail.style.width  = (f*100) + "%"; DOT.style.left = (f*W) + "px"; DOT.style.top  = "0px"; }
      if (s.side === "r") { trail.style.height = (f*100) + "%"; DOT.style.left = W + "px";       DOT.style.top  = (f*W) + "px"; }
      if (s.side === "b") { trail.style.width  = (f*100) + "%"; DOT.style.left = (W - f*W) + "px"; DOT.style.top  = W + "px"; }
      if (s.side === "l") { trail.style.height = (f*100) + "%"; DOT.style.left = "0px";           DOT.style.top  = (W - f*W) + "px"; }
      if (f < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    phaseT = setTimeout(() => {
      step += 1;
      if (step >= SEQ.length) {
        step = 0; cycle += 1;
        CYCLE.textContent = `cycle ${cycle} of ${CYCLES}`;
        resetTrails();
        if (cycle >= CYCLES) { stop(true); return; }
      }
      runStep();
    }, SECS_PER_SIDE*1000);
  }

  function start(){
    if (running) return;
    running = true; cycle = 0; step = 0;
    resetTrails();
    BTN.textContent = "stop";
    CYCLE.textContent = `cycle ${cycle} of ${CYCLES}`;
    Fly.interaction("start");
    runStep();
  }
  function stop(completed){
    running = false;
    clearTimeout(phaseT); clearInterval(tickT);
    PHASE.textContent = completed ? "done" : "paused";
    SECS.textContent = completed ? "✓" : "·";
    BTN.textContent = completed ? "again" : "resume";
    if (completed) Fly.complete();
  }

  BTN.addEventListener("click", () => { if (running) stop(false); else start(); });
  window.addEventListener("fly:pause", () => { if (running) stop(false); });
</script>
</body>
</html>
