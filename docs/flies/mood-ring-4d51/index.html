<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="fly:tags" content="ambient,visual,color">
<title>Mood Ring</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;font-family:-apple-system,system-ui,sans-serif;color:#1A2330;-webkit-tap-highlight-color:transparent;transition:background 1.6s cubic-bezier(.45,0,.55,1)}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px}
  .ring{width:60vmin;height:60vmin;max-width:280px;max-height:280px;border-radius:50%;box-shadow:0 30px 60px -20px rgba(0,0,0,.25),inset 0 0 0 1px rgba(255,255,255,.55);transition:background 1.6s cubic-bezier(.45,0,.55,1),transform 800ms cubic-bezier(.16,1,.3,1);cursor:pointer;will-change:transform}
  .ring:active{transform:scale(.97)}
  .label{font-size:13px;letter-spacing:.22em;text-transform:lowercase;color:rgba(0,0,0,.55)}
  .hex{font-variant-numeric:tabular-nums;font-size:14px;letter-spacing:.18em;color:rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="wrap">
  <div id="label" class="label">drift</div>
  <div id="ring" class="ring"></div>
  <div id="hex" class="hex">·</div>
</div>
<script>
(function(){if(window.Fly)return;function s(t,p){try{parent.postMessage({source:"fly",type:t,payload:p||null},"*")}catch(e){}}window.Fly={ready:()=>s("fly:ready"),interaction:k=>s("fly:interaction",{kind:k||null}),complete:()=>s("fly:complete"),catch:()=>s("fly:catch")};window.addEventListener("message",e=>{const d=e.data;if(!d||typeof d!=="object")return;if(d.type==="fly:active")window.dispatchEvent(new CustomEvent("fly:active"));if(d.type==="fly:pause")window.dispatchEvent(new CustomEvent("fly:pause"))});function r(){Fly.ready()}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",r,{once:true});else r();})();
</script>
<script>
  const palettes = [
    { name:"drift",   a:"#EAF1F6", b:"#F7FAFC", ring:["#9CD5CC","#2BB6A3"] },
    { name:"dusk",    a:"#FFEFE5", b:"#FFD9C7", ring:["#FF9F84","#E15B45"] },
    { name:"deep",    a:"#1E2A3A", b:"#0F1825", ring:["#5DA9E9","#2D7DD2"] },
    { name:"meadow",  a:"#E8F4DE", b:"#D8EBC8", ring:["#A8D88A","#5BAE4E"] },
    { name:"plum",    a:"#1F1530", b:"#2E1F47", ring:["#C892D8","#7B3FA0"] },
    { name:"honey",   a:"#FFF4D6", b:"#FFE5A0", ring:["#FFC34A","#E0902B"] },
    { name:"haze",    a:"#F1ECF8", b:"#E0D8F0", ring:["#B0A0E0","#705ABB"] },
    { name:"sea",     a:"#E2F2F2", b:"#CFE7E7", ring:["#7FCBCB","#2E8C8C"] },
  ];
  let idx = 0;
  function apply(i){
    const p = palettes[i % palettes.length];
    document.body.style.background = `linear-gradient(180deg,${p.a} 0%,${p.b} 100%)`;
    document.getElementById("ring").style.background = `radial-gradient(circle at 35% 30%,${p.ring[0]},${p.ring[1]} 70%)`;
    document.getElementById("label").textContent = p.name;
    document.getElementById("hex").textContent = p.ring[1];
  }
  apply(0);
  document.getElementById("ring").addEventListener("click", () => {
    idx = (idx + 1) % palettes.length;
    apply(idx);
    Fly.interaction("cycle");
  });
</script>
</body>
</html>
