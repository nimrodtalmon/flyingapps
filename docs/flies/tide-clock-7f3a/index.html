<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="fly:tags" content="time,ambient,visual">
<title>Tide Clock</title>
<style>
  html,body{margin:0;height:100%;background:linear-gradient(180deg,#E6F0F4 0%,#F4F8FA 60%,#FFFFFF 100%);font-family:-apple-system,system-ui,sans-serif;color:#1A2330;overflow:hidden;-webkit-tap-highlight-color:transparent}
  .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px}
  .face{position:relative;width:62vmin;height:62vmin;max-width:280px;max-height:280px;border-radius:50%;background:radial-gradient(circle at 30% 28%,#FFFFFF 0%,#F2F7FA 60%,#E5EEF3 100%);box-shadow:inset 0 1px 1px #fff,0 14px 36px rgba(46,80,110,0.10),0 2px 6px rgba(46,80,110,0.06)}
  .face::before{content:"";position:absolute;inset:6%;border-radius:50%;border:1px solid rgba(43,182,163,0.18)}
  .tick{position:absolute;top:50%;left:50%;width:1px;height:8px;background:#A8B6C2;transform-origin:50% 0;transform:translate(-50%,calc(-50% - 0px))}
  .hand{position:absolute;top:50%;left:50%;background:#1A2330;border-radius:2px;transform-origin:50% 100%;transition:transform .6s cubic-bezier(.16,1,.3,1)}
  .hour{width:3px;height:24%;margin-left:-1.5px;margin-top:-24%}
  .min{width:2px;height:34%;margin-left:-1px;margin-top:-34%;background:#2BB6A3}
  .pivot{position:absolute;top:50%;left:50%;width:10px;height:10px;border-radius:50%;background:#1A2330;transform:translate(-50%,-50%);box-shadow:0 0 0 3px rgba(43,182,163,.16)}
  .digital{font-variant-numeric:tabular-nums;letter-spacing:.04em;font-size:42px;font-weight:200;color:#1A2330}
  .tide{width:62vmin;max-width:280px;height:60px;border-radius:14px;background:#fff;box-shadow:0 2px 8px rgba(46,80,110,.06);overflow:hidden;position:relative}
  .wave{position:absolute;left:-25%;bottom:0;width:150%;height:100%;background:linear-gradient(180deg,#9CD5CC,#2BB6A3);clip-path:polygon(0 60%,5% 58%,10% 55%,15% 53%,20% 52%,25% 53%,30% 55%,35% 58%,40% 60%,45% 62%,50% 63%,55% 62%,60% 60%,65% 58%,70% 55%,75% 53%,80% 52%,85% 53%,90% 55%,95% 58%,100% 60%,100% 100%,0 100%);transition:transform 800ms cubic-bezier(.16,1,.3,1)}
  .label{font-size:12px;letter-spacing:.18em;text-transform:lowercase;color:#8B97A6}
  .mode-hidden{display:none}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="label" id="hint">tap to switch</div>
  <div id="analog" class="face">
    <div class="tick" style="transform:translate(-50%,-50%) rotate(0deg) translateY(-44%)"></div>
    <div class="tick" style="transform:translate(-50%,-50%) rotate(90deg) translateY(-44%)"></div>
    <div class="tick" style="transform:translate(-50%,-50%) rotate(180deg) translateY(-44%)"></div>
    <div class="tick" style="transform:translate(-50%,-50%) rotate(270deg) translateY(-44%)"></div>
    <div id="hand-h" class="hand hour"></div>
    <div id="hand-m" class="hand min"></div>
    <div class="pivot"></div>
  </div>
  <div id="digital" class="digital mode-hidden">--:--</div>
  <div class="tide"><div id="wave" class="wave"></div></div>
</div>
<script>
(function(){if(window.Fly)return;function s(t,p){try{parent.postMessage({source:"fly",type:t,payload:p||null},"*")}catch(e){}}window.Fly={ready:()=>s("fly:ready"),interaction:k=>s("fly:interaction",{kind:k||null}),complete:()=>s("fly:complete"),catch:()=>s("fly:catch")};window.addEventListener("message",e=>{const d=e.data;if(!d||typeof d!=="object")return;if(d.type==="fly:active")window.dispatchEvent(new CustomEvent("fly:active"));if(d.type==="fly:pause")window.dispatchEvent(new CustomEvent("fly:pause"))});function r(){Fly.ready()}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",r,{once:true});else r();})();
</script>
<script>
  let mode = "analog", ticking = true, raf = 0;
  const analog = document.getElementById("analog");
  const digital = document.getElementById("digital");
  const hh = document.getElementById("hand-h");
  const hm = document.getElementById("hand-m");
  const wave = document.getElementById("wave");

  function tick(){
    const d = new Date();
    const h = d.getHours()%12, m = d.getMinutes(), s = d.getSeconds();
    const hAng = (h + m/60) * 30;
    const mAng = (m + s/60) * 6;
    hh.style.transform = `translate(-50%,0) rotate(${hAng}deg)`;
    hm.style.transform = `translate(-50%,0) rotate(${mAng}deg)`;
    digital.textContent = String(d.getHours()).padStart(2,"0")+":"+String(m).padStart(2,"0");
    // tide: sine across 12 hours, height proxy
    const phase = ((d.getHours()*60 + m) / (12*60)) * Math.PI * 2;
    const level = 0.5 + 0.4*Math.sin(phase);
    wave.style.transform = `translateY(${(0.5 - level) * 40}%)`;
    if (ticking) raf = requestAnimationFrame(()=>setTimeout(tick, 950));
  }

  document.getElementById("wrap").addEventListener("click", () => {
    mode = mode === "analog" ? "digital" : "analog";
    analog.classList.toggle("mode-hidden", mode !== "analog");
    digital.classList.toggle("mode-hidden", mode !== "digital");
    document.getElementById("hint").textContent = mode === "analog" ? "tap to switch" : "tap to switch";
    Fly.interaction("toggle");
  });

  window.addEventListener("fly:pause", () => { ticking = false; cancelAnimationFrame(raf); });
  window.addEventListener("fly:active", () => { if (!ticking) { ticking = true; tick(); } });
  tick();
</script>
</body>
</html>
